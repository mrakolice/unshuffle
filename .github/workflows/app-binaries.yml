name: App Binaries

on:
  workflow_dispatch:
  push:
    paths:
      - "gui/**"
      - "unshuffle/**"
      - "data/**"
      - "docs/**"
      - "icons/**"
      - "bin/**"
      - "scripts/**"
      - "packaging/**"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/app-binaries.yml"

jobs:
  build:
    name: Build ${{ matrix.platform }} app
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            artifact_name: unshuffle-windows-installer
            artifact_path: dist/installer/UnshuffleWinSetup.exe
          - platform: macos
            runner: macos-latest
            artifact_name: unshuffle-macos-pkg
            artifact_path: dist/installer/Unshuffle-macos.pkg
          - platform: linux
            runner: ubuntu-latest
            artifact_name: unshuffle-linux-artifacts
            artifact_path: |
              dist/installer/*.deb
              dist/installer/*.AppImage

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install Windows installer compiler
        if: matrix.platform == 'windows'
        run: choco install innosetup --no-progress -y

      - name: Install macOS audio tooling
        if: matrix.platform == 'macos'
        run: brew install ffmpeg

      - name: Install Linux runtime tooling
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0

      - name: Build current-platform native extractor
        run: python scripts/build_native_extractor.py --copy-to-bin

      - name: Validate bundled native extractor
        run: python scripts/check_native_extractor_bundle.py

      - name: Prepare macOS app icon
        if: matrix.platform == 'macos'
        run: bash scripts/prepare_macos_icon.sh

      - name: Build app binary
        run: python scripts/build_app_binary.py

      - name: Smoke test Linux app binary startup
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set +e
          output="$(dist/Unshuffle/Unshuffle 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -ne 1 ]; then
            echo "Expected headless Linux smoke test to exit with status 1, got $status" >&2
            exit 1
          fi
          grep -F "Unshuffle GUI requires a graphical desktop session on Linux" <<< "$output"

      - name: Build Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ./scripts/build_windows_installer.ps1 -AppVersion "1.0.2"

      - name: Build macOS installer package
        if: matrix.platform == 'macos'
        run: bash scripts/build_macos_pkg.sh

      - name: Build Linux deb package
        if: matrix.platform == 'linux'
        run: python scripts/build_linux_deb.py --version "1.0.2"

      - name: Build Linux AppImage
        if: matrix.platform == 'linux'
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O bin/linux/appimagetool-x86_64.AppImage
          chmod +x bin/linux/appimagetool-x86_64.AppImage
          python scripts/build_linux_appimage.py --version "1.0.2"

      - name: Upload installable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
