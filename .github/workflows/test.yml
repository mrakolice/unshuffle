name: Run Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip 
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
        pip install -e .
    - name: Install Qt system dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get install -y libegl1 libpulse0
    - name: Test with pytest
      run: |
        python -m pytest -q

  linux-frozen-smoke:
    name: Frozen Linux startup smoke (${{ matrix.runner }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: ["ubuntu-24.04", "ubuntu-26.04"]
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install release build dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev.txt
    - name: Install Linux runtime dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ffmpeg \
          libegl1 \
          libgl1 \
          libpulse0 \
          libxkbcommon-x11-0 \
          libxcb-cursor0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxcb-xfixes0 \
          libxcb-xinerama0
    - name: Build frozen app
      run: python scripts/build_app_binary.py
    - name: Smoke test frozen app startup
      shell: bash
      run: |
        set +e
        output="$(dist/Unshuffle/Unshuffle 2>&1)"
        status=$?
        set -e
        printf '%s\n' "$output"
        if grep -F "No module named 'backports'" <<< "$output"; then
          echo "Frozen app still fails in PyInstaller runtime hook with missing backports." >&2
          exit 1
        fi
        if grep -F "pyi_rth_pkgres" <<< "$output"; then
          echo "Frozen app failed before application startup in PyInstaller pkg_resources hook." >&2
          exit 1
        fi
        if [ "$status" -ne 1 ]; then
          echo "Expected headless Linux smoke test to exit with status 1, got $status" >&2
          exit 1
        fi
        grep -F "Unshuffle GUI requires a graphical desktop session on Linux" <<< "$output"
